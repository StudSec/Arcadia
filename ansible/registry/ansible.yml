- name: Ensure Registry directory exists
  ansible.builtin.file:
    path: "/srv/registry"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy Registry configuration files
  ansible.posix.synchronize:
    src: "./registry/"
    dest: "/srv/registry/"
    recursive: true
  become: false

- name: Substitute environment variables in docker-compose.yml
  ansible.builtin.shell: |
    envsubst < /srv/registry/docker-compose.yml > /srv/registry/docker-compose.yml.tmp
    mv /srv/registry/docker-compose.yml.tmp /srv/registry/docker-compose.yml
  environment:
    DOMAIN: "registry.{{ CTF_DOMAIN }}"
  changed_when: true

- name: Install passlib for htpasswd module
  ansible.builtin.pip:
    name: passlib
    executable: pip3
    extra_args: --break-system-packages

- name: Create registry htpasswd file
  community.general.htpasswd:
    path: /srv/registry/auth/htpasswd
    name: "admin"
    password: "{{ ADMIN_PASS }}"
    crypt_scheme: bcrypt
    owner: root
    group: root
    mode: "0644"

- name: Build and start Registry docker
  community.docker.docker_stack:
    compose: /srv/registry/docker-compose.yml
    state: present
    name: registry
