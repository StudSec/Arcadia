- name: Challs - Initialization
  hosts: challs
  remote_user: root
  become: true
  vars_files:
    - .env.yml
  tags:
    - setup
  vars:
    # installed by geerlingguy.pip
    pip_install_packages:
      - name: docker
  environment:
    NEEDRESTART_MODE: automatically

  pre_tasks:
    - name: Wait for cloud-init / user-data to finish
      # https://serverfault.com/a/1021022
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
    - name: Populate Apt's Cache with package definitions to avoid "no such package" errors
      # https://github.com/geerlingguy/ansible-role-pip/issues/49#issuecomment-1824708282
      ansible.builtin.apt:
        update_cache: true
  roles:
    - geerlingguy.git
    - geerlingguy.pip
    - geerlingguy.docker

  tasks:
    - name: Set challs label
      community.docker.docker_node:
        hostname: "{{ ansible_hostname }}"
        role: manager
        labels:
          type: challs
      delegate_to: "{{ groups['manager'][0] }}"

    - name: Login to remote Docker registry
      community.docker.docker_login:
        registry_url: "registry.{{ CTF_DOMAIN }}"
        username: "admin"
        password: "{{ ADMIN_PASS }}"

- name: Challs - Deploy challenges
  hosts: manager
  remote_user: root
  become: true
  vars_files:
    - .env.yml
  tasks:
    - name: Clone challenges repository
      ansible.builtin.git:
        repo: "{{ CHALL_REPO }}"
        dest: /opt/challs

    - name: Install Python dependencies for deploy.py
      ansible.builtin.pip:
        requirements: /opt/challs/requirements.txt
        executable: pip3
        extra_args: --break-system-packages

    - name: Deploy challenges with checker.py
      ansible.builtin.command: >
        python3 /opt/challs/checker.py --run --host {{ CHALLS_DOMAIN }} --CTFd "https://{{ CTF_DOMAIN }} {{ ADMIN_TOKEN }}" --registry registry.{{ CTF_DOMAIN }}
      changed_when: true
